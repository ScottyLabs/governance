version: 3
projects:
  - name: governance
    dir: tofu
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tf.json"
        - "../data/**"
      enabled: true
    workflow: governance

workflows:
  governance:
    plan:
      steps:
        - run: cargo build --release -p governance --manifest-path ../Cargo.toml
        - env:
            name: PATH
            command: echo "$(cd .. && pwd)/target/release:$PATH"
        - init
        - plan
    apply:
      steps:
        - env:
            name: PATH
            command: echo "$(cd .. && pwd)/target/release:$PATH"
        - apply
