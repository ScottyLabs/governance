name: Validate
on: [pull_request_target]

jobs:
  editorconfig:
    name: EditorConfig
    if: ${{ github.actor != 'scottylabs-bot' }}
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: editorconfig-checker
          fallback: none

      - run: editorconfig-checker

  toml:
    name: TOML
    if: ${{ github.actor != 'scottylabs-bot' }}
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: taplo
          fallback: none

      - run: taplo fmt --check
      - run: taplo check

  governance:
    name: Governance
    if: ${{ github.actor != 'scottylabs-bot' }}
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: https://github.com/dtolnay/rust-toolchain@stable

      - uses: https://github.com/Swatinem/rust-cache@v2

      - run: cargo build -p governance

      - name: Validate
        run: ./target/debug/governance validate
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          MATRIX_ADMIN_TOKEN: ${{ secrets.MATRIX_ADMIN_TOKEN }}

      - name: Regenerate tofu, schemas, CODEOWNERS
        run: ./.forgejo/scripts/regenerate.sh

      - name: Commit regenerated files if changed
        env:
          BOT_TOKEN: ${{ secrets.CB_GOVERNANCE_TOKEN }}
          SIGNING_KEY: ${{ secrets.BOT_SSH_SIGNING_KEY }}
          HEAD_CLONE_URL: ${{ github.event.pull_request.head.repo.clone_url }}
          HEAD_FULL: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_FULL: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          ALLOW_EDIT: ${{ github.event.pull_request.allow_maintainer_edit }}
        run: ./.forgejo/scripts/commit-regen.sh
