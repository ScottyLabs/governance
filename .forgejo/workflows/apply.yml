name: OpenTofu Apply
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "tofu/**"

jobs:
  apply:
    name: Apply
    runs-on: docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_github_token: ${{ secrets.GH_GOVERNANCE_TOKEN }}
      TF_VAR_forgejo_token: ${{ secrets.FORGEJO_TOKEN }}
      TF_VAR_keycloak_client_id: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      TF_VAR_keycloak_client_secret: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_discord_token: ${{ secrets.DISCORD_TOKEN }}
      TF_VAR_slack_token: ${{ secrets.SLACK_TOKEN }}
      TF_VAR_google_credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      TF_VAR_vaultwarden_email: ${{ secrets.VAULTWARDEN_EMAIL }}
      TF_VAR_vaultwarden_master_password: ${{ secrets.VAULTWARDEN_MASTER_PASSWORD }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Install OpenTofu
        uses: https://github.com/opentofu/setup-opentofu@v2

      - name: Build CLI
        uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/Swatinem/rust-cache@v2
      - run: cargo build --release -p governance

      - name: Init
        working-directory: tofu
        run: tofu init

      - name: Apply
        working-directory: tofu
        run: tofu apply -auto-approve
