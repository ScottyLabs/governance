name: OpenTofu Apply
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "tofu/**"
      - ".forgejo/workflows/apply.yml"

jobs:
  apply:
    name: Apply
    runs-on: docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_github_token: ${{ secrets.GH_GOVERNANCE_TOKEN }}
      TF_VAR_forgejo_token: ${{ secrets.FORGEJO_TOKEN }}
      TF_VAR_keycloak_client_id: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      TF_VAR_keycloak_client_secret: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_discord_token: ${{ secrets.DISCORD_TOKEN }}

      TF_VAR_google_credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      TF_VAR_vaultwarden_email: ${{ secrets.VAULTWARDEN_EMAIL }}
      TF_VAR_vaultwarden_master_password: ${{ secrets.VAULTWARDEN_MASTER_PASSWORD }}
      KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Install OpenTofu
        uses: https://github.com/opentofu/setup-opentofu@v2

      - name: Build CLI
        uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/Swatinem/rust-cache@v2
      - run: cargo build --release -p governance
      - run: echo "$(pwd)/target/release" >> $GITHUB_PATH

      - name: Install patched Forgejo provider
        run: |
          mkdir -p /tmp/forgejo-provider
          curl -sL https://github.com/ap-1/terraform-provider-forgejo/releases/download/v1.4.1/terraform-provider-forgejo_1.4.1_linux_amd64.zip -o /tmp/fp.zip
          unzip -o /tmp/fp.zip -d /tmp/forgejo-provider
          chmod +x /tmp/forgejo-provider/terraform-provider-forgejo_*
          mkdir -p ~/.terraform.d
          cat > ~/.terraform.d/dev_overrides.tfrc << EOF
          provider_installation {
            dev_overrides {
              "svalabs/forgejo" = "/tmp/forgejo-provider"
            }
            direct {}
          }
          EOF
          echo "TF_CLI_CONFIG_FILE=$HOME/.terraform.d/dev_overrides.tfrc" >> $GITHUB_ENV

      - name: Init
        working-directory: tofu
        run: tofu init

      - name: Apply
        working-directory: tofu
        run: tofu apply -auto-approve
