name: OpenTofu Apply
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "tofu/**"
      - ".forgejo/workflows/apply.yml"
  workflow_dispatch:

jobs:
  apply:
    name: Apply
    runs-on: docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_github_token: ${{ secrets.GH_GOVERNANCE_TOKEN }}
      TF_VAR_forgejo_token: ${{ secrets.CB_GOVERNANCE_TOKEN }}
      TF_VAR_keycloak_client_id: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      TF_VAR_keycloak_client_secret: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_discord_token: ${{ secrets.DISCORD_TOKEN }}
      TF_VAR_sentry_token: ${{ secrets.SENTRY_TOKEN }}

      TF_VAR_google_credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      TF_VAR_vaultwarden_email: ${{ secrets.VAULTWARDEN_EMAIL }}
      TF_VAR_vaultwarden_master_password: ${{ secrets.VAULTWARDEN_MASTER_PASSWORD }}
      TF_VAR_vault_approle_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
      TF_VAR_vault_approle_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
      KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Install OpenTofu
        uses: https://github.com/opentofu/setup-opentofu@v2

      - name: Build CLI
        uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/Swatinem/rust-cache@v2
      - run: cargo build --release -p governance
      - run: echo "$(pwd)/target/release" >> $GITHUB_PATH

      - name: Validate
        run: ./target/release/governance validate

      - name: Check generated files are up to date
        run: |
          cp .forgejo/CODEOWNERS /tmp/CODEOWNERS-old
          ./target/release/governance generate --output-dir /tmp/tofu
          ./target/release/governance schema --output-dir /tmp/schemas
          diff -r /tmp/tofu tofu/ --exclude='*.tf' --exclude='.gitignore'
          diff -r /tmp/schemas schemas/
          diff /tmp/CODEOWNERS-old .forgejo/CODEOWNERS

      - name: Init
        working-directory: tofu
        run: tofu init

      - name: Refresh state from providers
        working-directory: tofu
        run: tofu apply -refresh-only -auto-approve

      - name: Apply
        working-directory: tofu
        run: tofu apply -auto-approve

      - name: Sync observability CODEOWNERS
        env:
          BOT_TOKEN: ${{ secrets.CB_GOVERNANCE_TOKEN }}
          SIGNING_KEY: ${{ secrets.BOT_SSH_SIGNING_KEY }}
        run: |
          set -euo pipefail
          ./target/release/governance observability-codeowners > /tmp/CODEOWNERS-new

          git clone "https://scottylabs-bot:${BOT_TOKEN}@codeberg.org/ScottyLabs/observability.git" /tmp/observability
          mkdir -p /tmp/observability/.forgejo

          if [ -f /tmp/observability/.forgejo/CODEOWNERS ] && \
             cmp -s /tmp/CODEOWNERS-new /tmp/observability/.forgejo/CODEOWNERS; then
            echo "observability CODEOWNERS already up to date"
            exit 0
          fi

          cp /tmp/CODEOWNERS-new /tmp/observability/.forgejo/CODEOWNERS

          cd /tmp/observability
          echo "$SIGNING_KEY" > /tmp/signing_key
          chmod 600 /tmp/signing_key
          git config user.name "scottylabs-bot"
          git config user.email "ops+codeberg@scottylabs.org"
          git config gpg.format ssh
          git config user.signingkey /tmp/signing_key
          git config commit.gpgsign true

          git add .forgejo/CODEOWNERS
          git commit -m "chore: regenerate CODEOWNERS"
          git push
