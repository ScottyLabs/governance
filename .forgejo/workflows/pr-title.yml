name: PR Title

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  conventional-commits:
    name: Conventional Commits
    if: ${{ github.actor != 'scottylabs-bot' }}
    runs-on: docker
    steps:
      - uses: https://github.com/ytanikin/pr-conventional-commits@639145d78959c53c43112365837e3abd21ed67c1 # 1.5.2
        with:
          task_types: '["build","chore","ci","docs","feat","fix","perf","refactor","revert","style","test"]'
          add_label: "false"
